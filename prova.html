<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedFlow.AI · Prova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/medbase.css" />
  <style>
    .prova-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 14px 24px;
      background: rgba(6,9,16,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .prova-nav-titulo { font-size: 0.9rem; font-weight: 600; color: var(--white); }
    .prova-timer { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; color: var(--blue-neon); min-width: 80px; text-align: right; }
    .prova-timer.urgente { color: #f87171; }

    .progress-bar { position: fixed; top: 57px; left: 0; right: 0; height: 2px; background: var(--bg-surface); z-index: 999; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue-main), var(--cyan)); transition: width 0.3s ease; width: 0%; }

    .questao-nav { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 24px; max-width: 900px; margin: 0 auto; }
    .questao-bubble {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--muted);
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .questao-bubble:hover { border-color: var(--border-glow); color: var(--blue-neon); }
    .questao-bubble.atual { background: linear-gradient(135deg, var(--blue-main), var(--cyan)); border-color: transparent; color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
    .questao-bubble.acertou { border-color: #4ade80; background: rgba(74,222,128,0.1); color: #4ade80; }
    .questao-bubble.errou { border-color: #f87171; background: rgba(248,113,113,0.1); color: #f87171; }
    .questao-bubble.respondida { border-color: var(--muted-dim); color: var(--white); }

    .prova-main { max-width: 860px; margin: 0 auto; padding: 100px 24px 120px; }
    .prova-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 36px;
    }

    .questao-numero { font-size: 0.72rem; font-weight: 700; letter-spacing: 3px; color: var(--blue-neon); margin-bottom: 16px; text-transform: uppercase; }
    .questao-enunciado { font-size: 0.95rem; line-height: 1.8; color: var(--white); margin-bottom: 28px; }

    .alternativas-list { display: flex; flex-direction: column; gap: 10px; }
    .alternativa-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--white);
      text-align: left;
      transition: var(--transition);
      width: 100%;
    }
    .alternativa-btn:hover:not(:disabled) { border-color: var(--border-glow); background: rgba(56,189,248,0.06); transform: translateX(4px); }
    .alternativa-btn.correta { border-color: #4ade80; background: rgba(74,222,128,0.08); color: #4ade80; }
    .alternativa-btn.errada { border-color: #f87171; background: rgba(248,113,113,0.08); color: #f87171; }
    .alternativa-letra { font-weight: 800; color: var(--blue-neon); min-width: 24px; font-size: 0.95rem; }
    .alternativa-btn.correta .alternativa-letra, .alternativa-btn.errada .alternativa-letra { color: inherit; }

    .gabarito-box {
      margin-top: 20px;
      background: var(--bg-surface);
      border-left: 3px solid var(--blue-neon);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 16px 20px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
      animation: fadeIn 0.3s ease;
    }
    .gabarito-box.acerto { border-left-color: #4ade80; }
    .gabarito-box.erro { border-left-color: #f87171; }
    .gabarito-resultado { font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; }
    .gabarito-resultado.acerto { color: #4ade80; }
    .gabarito-resultado.erro { color: #f87171; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .prova-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(6,9,16,0.92);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
      backdrop-filter: blur(20px);
    }
    .btn-nav {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .btn-nav:hover { border-color: var(--border-glow); color: var(--blue-neon); }
    .btn-finalizar {
      background: linear-gradient(135deg, var(--blue-main), var(--cyan));
      border: none; color: white;
      padding: 10px 28px;
      border-radius: 100px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer;
      font-family: var(--font-body);
      transition: var(--transition);
      box-shadow: 0 4px 18px rgba(59,130,246,0.35);
    }
    .btn-finalizar:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(59,130,246,0.5); }

    /* Config Modal */
    .config-opcoes { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .config-btn {
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex; align-items: flex-start; gap: 12px;
      cursor: pointer;
      font-family: var(--font-body);
      text-align: left;
      transition: var(--transition);
      color: var(--white);
    }
    .config-btn.active { border-color: var(--blue-neon); background: rgba(56,189,248,0.08); }
    .config-btn-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 4px; color: var(--white); }
    .config-btn-desc { font-size: 0.78rem; color: var(--muted); }

    .config-toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .config-toggle-label { font-size: 0.88rem; font-weight: 600; color: var(--white); }
    .config-toggle-desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      transition: var(--transition);
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: var(--transition);
    }
    .toggle input:checked + .toggle-slider { background: var(--blue-main); border-color: var(--blue-main); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: white; }

    .timer-slider-row { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: var(--blue-neon); font-weight: 700; }
    .timer-slider-row input { flex: 1; accent-color: var(--blue-main); }

    /* Resultado Modal */
    .resultado-score { font-family: var(--font-display); font-size: 3.5rem; font-weight: 800; text-align: center; color: var(--white); letter-spacing: -2px; margin: 16px 0 8px; }
    .resultado-percent {
      text-align: center; font-size: 1.2rem; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--blue-neon), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .resultado-msg { text-align: center; font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }
    .resultado-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(34px, 1fr)); gap: 8px; }
    .resultado-item { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    .resultado-item.acerto { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid #4ade80; }
    .resultado-item.erro { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid #f87171; }
    .resultado-item.pulou { background: var(--bg-surface); color: var(--muted); border: 1px solid var(--border); }

    .loading-text { text-align: center; color: var(--muted); padding: 40px; }

    /* Questões abertas */
    .resposta-aberta-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 0.9rem;
      color: var(--white);
      font-family: var(--font-body);
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: var(--transition);
      margin-bottom: 16px;
    }
    .resposta-aberta-input:focus { border-color: var(--border-glow); box-shadow: 0 0 0 3px rgba(56,189,248,0.1); }

    .btn-ver-gabarito {
      background: linear-gradient(135deg, var(--blue-main), var(--cyan));
      color: white; border: none;
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: var(--transition);
      width: 100%;
    }
    .btn-ver-gabarito:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.4); }

    .aberta-comparacao { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .aberta-col { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; }
    .aberta-col-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; color: var(--blue-neon); margin-bottom: 10px; text-transform: uppercase; }
    .aberta-col-texto { font-size: 0.88rem; color: var(--white); line-height: 1.7; }

    .autoavaliacao { margin-top: 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; }
    .autoavaliacao-label { font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
    .autoavaliacao-btns { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .btn-nota {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      font-size: 0.88rem; font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .btn-nota:hover { border-color: var(--border-glow); color: var(--blue-neon); }
    .btn-nota.ativo { background: rgba(56,189,248,0.1); border-color: var(--blue-neon); color: var(--blue-neon); }

    @media (max-width: 600px) {
      .prova-card { padding: 20px 16px; }
      .aberta-comparacao { grid-template-columns: 1fr; }
      .autoavaliacao-btns { grid-template-columns: repeat(2,1fr); }
      .questao-bubble { width: 28px; height: 28px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

  <nav class="prova-nav">
    <button class="btn btn--ghost" id="btn-inicio" onclick="confirmarSaida()">← Início</button>
    <div id="prova-titulo" class="prova-nav-titulo">SOI 1 · 2023.1</div>
    <div class="prova-timer" id="timer">--:--</div>
  </nav>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="questao-nav" id="questao-nav"></div>

  <main class="prova-main">
    <div class="prova-card" id="prova-card">
      <div class="loading-text">Carregando prova...</div>
    </div>
  </main>

  <footer class="prova-footer">
    <button class="btn-nav" id="btn-anterior">← Anterior</button>
    <button class="btn-finalizar" id="btn-finalizar">Finalizar Prova</button>
    <button class="btn-nav" id="btn-proxima">Próxima →</button>
  </footer>

  <!-- MODAL CONFIG -->
  <div class="modal-overlay active" id="modal-config">
    <div class="modal">
      <div class="modal-title-bar">CONFIGURAR PROVA</div>
      <div class="modal-subject" id="config-titulo">SOI 1</div>
      <div class="config-opcoes">
        <div style="font-size:0.72rem;font-weight:700;letter-spacing:3px;color:var(--blue-neon);margin-bottom:4px;">QUANDO MOSTRAR GABARITO?</div>
        <div class="config-grid">
          <button class="config-btn active" id="cfg-apos-responder" onclick="selecionarModo('apos')">
            <span>⚡</span>
            <div>
              <div class="config-btn-title">Após responder</div>
              <div class="config-btn-desc">Ver gabarito logo após cada questão</div>
            </div>
          </button>
          <button class="config-btn" id="cfg-no-final" onclick="selecionarModo('final')">
            <span>🏁</span>
            <div>
              <div class="config-btn-title">Apenas no final</div>
              <div class="config-btn-desc">Ver resultado ao terminar</div>
            </div>
          </button>
        </div>
        <div class="config-toggle-row">
          <div>
            <div class="config-toggle-label">Usar timer</div>
            <div class="config-toggle-desc">Tempo limitado por questão</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="cfg-timer" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div id="timer-config">
          <div class="config-toggle-label" style="margin-bottom:8px;font-size:0.88rem;">Tempo total (minutos)</div>
          <div class="timer-slider-row">
            <span id="timer-valor">100</span> min
            <input type="range" id="cfg-tempo" min="10" max="180" value="100" oninput="document.getElementById('timer-valor').textContent=this.value">
          </div>
        </div>
      </div>
      <button class="btn btn--primary" id="btn-iniciar" style="margin-top:24px;width:100%;justify-content:center;">INICIAR PROVA →</button>
    </div>
  </div>

  <!-- MODAL RESULTADO -->
  <div class="modal-overlay" id="modal-resultado">
    <div class="modal">
      <div class="modal-title-bar">RESULTADO</div>
      <div class="resultado-score" id="resultado-score">0/0</div>
      <div class="resultado-percent" id="resultado-percent">0%</div>
      <div class="resultado-msg" id="resultado-msg"></div>
      <div class="resultado-grid" id="resultado-grid"></div>
      <button class="btn btn--primary" onclick="window.location.href='index.html'" style="margin-top:24px;width:100%;justify-content:center;">← Voltar ao início</button>
    </div>
  </div>

  <script type="module" src="js/prova.js"></script>
</body>
</html>
