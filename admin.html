<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedFlow.AI · Admin</title>
  <script src="js/tema.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-btn">← Voltar</a>
    <div class="logo">Med<b>Flow</b>.AI · Admin</div>
    <div class="tog-wrap" id="tog-wrap">
      <div class="tog">
        <div class="knob">
          <div class="dots">
            <div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div>
          </div>
        </div>
        <div class="cld"></div>
      </div>
    </div>
  </nav>

  <main class="admin-main">

    <div class="admin-card">
      <div class="sobre-label">NOVA PROVA</div>

      <div class="admin-form">
        <div class="admin-row">
          <div class="input-group">
            <label class="input-label">Matéria</label>
            <input type="text" id="materia" class="input-field" placeholder="Ex: SOI 1">
          </div>
          <div class="input-group">
            <label class="input-label">Período</label>
            <input type="number" id="periodo" class="input-field" placeholder="Ex: 1">
          </div>
          <div class="input-group">
            <label class="input-label">Ano</label>
            <input type="number" id="ano" class="input-field" placeholder="Ex: 2023">
          </div>
          <div class="input-group">
            <label class="input-label">Semestre</label>
            <select id="semestre" class="input-field">
              <option value="1">1º semestre</option>
              <option value="2">2º semestre</option>
            </select>
          </div>
        </div>

        <!-- MODO IA -->
        <div class="admin-card" style="margin-top:8px">
          <div class="sobre-label">MODO IA · GEMINI</div>
          <div class="admin-form" style="margin-top:16px">
            <div class="input-group">
              <label class="input-label">Chave do Gemini</label>
              <input type="password" id="gemini-key" class="input-field" placeholder="AIza...">
            </div>
            <div class="input-group">
              <label class="input-label">PDF da prova</label>
              <input type="file" id="pdf-input" class="input-field" accept=".pdf">
            </div>
            <button class="btn-primary" id="btn-extrair">🤖 Extrair questões com IA</button>
          </div>
        </div>

        <!-- MODO MANUAL -->
        <div class="admin-card" style="margin-top:8px">
          <div class="sobre-label">MODO MANUAL · COLAR JSON</div>
          <div class="admin-form" style="margin-top:16px">
            <div class="input-group">
              <label class="input-label">Cole o JSON aqui</label>
              <textarea id="json-input" class="input-field" rows="8" placeholder='[{"numero":1,"enunciado":"...","alternativa_a":"...","alternativa_b":"...","alternativa_c":"...","alternativa_d":"...","gabarito":"A","comentario":"..."}]'></textarea>
            </div>
            <button class="btn-primary" id="btn-colar-json" style="background:var(--surface2);border:1px solid var(--accent-border);color:var(--accent)">📋 Carregar JSON</button>
          </div>
        </div>

        <p class="admin-status" id="admin-status"></p>
      </div>
    </div>

    <div id="questoes-container"></div>

  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
