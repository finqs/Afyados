<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedFlow.AI · Login</title>
  <meta name="description" content="Faça login na plataforma MedFlow.AI para acessar questões, simulados e materiais de medicina.">
  <script src="js/tema.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div></div>
    <div class="logo">Med<b>Flow</b>.AI</div>
    <div class="tog-wrap" id="tog-wrap">
      <div class="tog">
        <div class="knob">
          <div class="dots">
            <div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div>
          </div>
        </div>
        <div class="cld"></div>
      </div>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <h2 class="auth-title">Entrar</h2>
      <p class="auth-sub">Acesse sua conta para continuar</p>

      <div class="auth-form">
        <div class="input-group">
          <label class="input-label" for="email">E-mail</label>
          <input type="email" id="email" class="input-field" placeholder="seu@email.com">
        </div>
        <div class="input-group">
          <label class="input-label" for="senha">Senha</label>
          <input type="password" id="senha" class="input-field" placeholder="••••••••">
        </div>
        <button class="btn-primary" id="btn-login">Entrar</button>
        <p class="auth-switch">Não tem conta? <a href="cadastro.html" class="auth-link">Cadastre-se</a></p>
        <p class="auth-error" id="auth-error"></p>
      </div>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
