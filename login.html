<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afyados · Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div></div>
    <div class="logo">Afyados</div>
    <div></div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <h2 class="auth-title">Entrar</h2>
      <p class="auth-sub">Acesse sua conta para continuar</p>

      <div class="auth-form">
        <div class="input-group">
          <label class="input-label">E-mail</label>
          <input type="email" id="email" class="input-field" placeholder="seu@email.com">
        </div>
        <div class="input-group">
          <label class="input-label">Senha</label>
          <input type="password" id="senha" class="input-field" placeholder="••••••••">
        </div>
        <button class="btn-primary" id="btn-login">Entrar</button>
        <p class="auth-switch">Não tem conta? <a href="cadastro.html" class="auth-link">Cadastre-se</a></p>
        <p class="auth-error" id="auth-error"></p>
      </div>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
